name: Build CARTA AppImage

on:
  workflow_dispatch:
    inputs:
      backend_version:
        description: 'Backend version (branch / tag / commit, e.g. v6.0.0-beta.1)'
        required: true
        default: 'v6.0.0-beta.1'
      frontend_version:
        description: 'Frontend version (branch / tag / commit, e.g. v6.0.0-beta.1.0.2)'
        required: true
        default: 'v6.0.0-beta.1.0.2'
      release_version:
        description: 'Release version used for output filename (e.g. v6.0.0-beta.1)'
        required: true
        default: 'v6.0.0-beta.1'
      release:
        description: 'Release build?'
        required: true
        default: 'TRUE'
        type: choice
        options:
          - 'TRUE'
          - 'FALSE'
      beta_release:
        description: 'Beta release?'
        required: true
        default: 'TRUE'
        type: choice
        options:
          - 'TRUE'
          - 'FALSE'
      npm_frontend:
        description: 'Use NPM pre-built frontend?'
        required: true
        default: 'TRUE'
        type: choice
        options:
          - 'TRUE'
          - 'FALSE'
      release_date:
        description: 'Release date in YYYY-MM-DD format (required when RELEASE=TRUE)'
        required: false
        default: ''

jobs:
  build-appimage:
    runs-on: [self-hosted, cd]

    env:
      BACKEND_VERSION:  ${{ inputs.backend_version }}
      FRONTEND_VERSION: ${{ inputs.frontend_version }}
      RELEASE_VERSION:  ${{ inputs.release_version }}
      RELEASE:          ${{ inputs.release }}
      BETA_RELEASE:     ${{ inputs.beta_release }}
      NPM_FRONTEND:     ${{ inputs.npm_frontend }}
      RELEASE_DATE:     ${{ inputs.release_date }}

    defaults:
      run:
        working-directory: CARTA-AppImage-creator

    steps:
      # ── 1. Checkout carta-package ─────────────────────────────────────────
      - name: Checkout carta-package
        uses: actions/checkout@v4
        with:
          ref: posh/v6-beta

      # ── 2. Generate default appimage_config ───────────────────────────────
      - name: Generate default appimage_config
        run: sh generate_default_appimage_config.sh

      # ── 3. Override config values with workflow inputs ─────────────────────
      - name: Apply workflow inputs to appimage_config
        run: |
          # Overwrite version-related fields
          sed -i "s|^BACKEND_VERSION=.*|BACKEND_VERSION=${BACKEND_VERSION}|"   appimage_config
          sed -i "s|^FRONTEND_VERSION=.*|FRONTEND_VERSION=${FRONTEND_VERSION}|" appimage_config
          sed -i "s|^RELEASE_VERSION=.*|RELEASE_VERSION=${RELEASE_VERSION}|"   appimage_config
          sed -i "s|^RELEASE=.*|RELEASE=${RELEASE}|"                           appimage_config
          sed -i "s|^BETA_RELEASE=.*|BETA_RELEASE=${BETA_RELEASE}|"           appimage_config
          sed -i "s|^NPM_FRONTEND=.*|NPM_FRONTEND=${NPM_FRONTEND}|"           appimage_config

          # Set PACKAGING_PATH to the current working directory (host-side mount)
          PACKAGING_PATH="$(pwd)"
          sed -i "s|^PACKAGING_PATH=.*|PACKAGING_PATH=${PACKAGING_PATH}|" appimage_config

          # Inject RELEASE_DATE (append if key does not exist yet)
          if grep -q "^RELEASE_DATE=" appimage_config; then
            sed -i "s|^RELEASE_DATE=.*|RELEASE_DATE=${RELEASE_DATE}|" appimage_config
          else
            echo "RELEASE_DATE=${RELEASE_DATE}" >> appimage_config
          fi

          echo "=== Final appimage_config ==="
          cat appimage_config

      # ── 4a. Build Docker image (AlmaLinux 8.10) ────────────────────────────
      - name: Build Docker image
        run: sh build_docker_image.sh

      # ── 4b. Run Docker packaging ─────────────────────────────────────────
      - name: Run docker package
        run: |
          # When RELEASE=TRUE, run_pack.sh prompts twice for version / date
          # confirmation. Pipe "y" responses through docker exec -i.
          if [ "${RELEASE}" = "TRUE" ]; then
            printf 'y\ny\n' | sh run_docker_package.sh
          else
            sh run_docker_package.sh
          fi

      # ── 5. Verify packaged backend version ────────────────────────────────
      - name: Check packaged backend version
        run: |
          . ./appimage_config

          ARCH=$(arch)
          if [ "${ARCH}" = "arm64" ]; then
            ARCH="aarch64"
          fi

          if [ "${RELEASE}" = "TRUE" ]; then
            VERSION="${RELEASE_VERSION}"
          else
            VERSION="${FRONTEND_VERSION}-${BACKEND_VERSION}"
          fi

          APPIMAGE_FILE="carta-${VERSION}-${ARCH}.AppImage"
          echo "Expected AppImage: ${APPIMAGE_FILE}"

          if [ ! -f "${APPIMAGE_FILE}" ]; then
            echo "ERROR: AppImage not found — ${APPIMAGE_FILE}"
            echo "Available AppImage files:"
            ls -lh carta-*.AppImage 2>/dev/null || echo "(none)"
            exit 1
          fi

          echo "AppImage found: ${APPIMAGE_FILE}"
          echo "File size: $(du -sh "${APPIMAGE_FILE}" | cut -f1)"

          # Run the AppImage to print the backend version
          chmod +x "${APPIMAGE_FILE}"
          echo "--- Backend version output ---"
          APPIMAGE_EXTRACT_AND_RUN=1 ./"${APPIMAGE_FILE}" --version 2>&1 || true
